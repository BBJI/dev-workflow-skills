<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DWS Dashboard</title>
<style>
:root {
  --c-bg: #0f0f1a;
  --c-surface: #1a1a2e;
  --c-surface2: #22223a;
  --c-border: #2d2d4a;
  --c-text: #e0e0ef;
  --c-text2: #8888a8;
  --c-primary: #4f8cff;
  --c-success: #34d399;
  --c-warning: #fbbf24;
  --c-danger: #f87171;
  --c-info: #60a5fa;
  --c-pending: #4a4a6a;
  --c-skipped: #3a3a5a;
  --radius: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,.3);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--c-bg);color:var(--c-text);line-height:1.5;min-height:100vh}

/* Header */
.header{background:var(--c-surface);border-bottom:1px solid var(--c-border);padding:12px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.header h1{font-size:16px;font-weight:600;color:var(--c-text)}
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:500}
.status-badge.in-progress{background:rgba(79,140,255,.15);color:var(--c-primary)}
.status-badge.consensus-loop{background:rgba(251,191,36,.15);color:var(--c-warning)}
.status-badge.tdd-loop{background:rgba(96,165,250,.15);color:var(--c-info)}
.status-badge.blocked{background:rgba(248,113,113,.15);color:var(--c-danger)}
.status-badge.completed{background:rgba(52,211,153,.15);color:var(--c-success)}
.status-badge.not-started{background:rgba(74,74,106,.2);color:var(--c-text2)}
.status-badge.failed{background:rgba(248,113,113,.2);color:var(--c-danger)}
.conn-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.conn-dot.connected{background:var(--c-success)}
.conn-dot.disconnected{background:var(--c-danger);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.3}}
.phase-label{margin-left:auto;font-size:13px;color:var(--c-text2)}

/* Timeline */
.timeline{background:var(--c-surface);border-bottom:1px solid var(--c-border);padding:16px 24px;display:flex;align-items:center;gap:0;overflow-x:auto}
.phase-node{display:flex;flex-direction:column;align-items:center;min-width:80px;cursor:pointer;position:relative;transition:transform .15s}
.phase-node:hover{transform:scale(1.05)}
.phase-node.active{transform:scale(1.1)}
.phase-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;border:2px solid var(--c-pending);color:var(--c-text2);background:var(--c-surface2);transition:all .3s}
.phase-node.pending .phase-circle{border-color:var(--c-pending);color:var(--c-text2)}
.phase-node.in-progress .phase-circle{border-color:var(--c-primary);color:var(--c-primary);background:rgba(79,140,255,.1);animation:pulse 2s infinite}
.phase-node.completed .phase-circle{border-color:var(--c-success);color:#fff;background:var(--c-success)}
.phase-node.blocked .phase-circle{border-color:var(--c-danger);color:var(--c-danger);background:rgba(248,113,113,.1)}
.phase-node.skipped .phase-circle{border-color:var(--c-skipped);color:var(--c-text2);background:var(--c-skipped);text-decoration:line-through}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(79,140,255,.4)}50%{box-shadow:0 0 0 8px rgba(79,140,255,0)}}
.phase-name{font-size:10px;margin-top:6px;color:var(--c-text2);text-align:center;white-space:nowrap}
.phase-node.active .phase-name{color:var(--c-text);font-weight:500}
.phase-connector{width:24px;height:2px;background:var(--c-pending);flex-shrink:0;margin-top:14px}
.phase-connector.completed{background:var(--c-success)}

/* Main layout */
.main{display:flex;gap:0;min-height:calc(100vh - 130px)}
.panel-main{flex:1;padding:20px 24px;overflow-y:auto;border-right:1px solid var(--c-border)}
.panel-side{width:380px;padding:20px;overflow-y:auto;background:var(--c-surface);display:flex;flex-direction:column;gap:20px}

/* Phase detail */
.phase-detail h2{font-size:18px;margin-bottom:4px}
.phase-detail .phase-meta{font-size:12px;color:var(--c-text2);margin-bottom:16px}

/* Steps */
.step-list{display:flex;flex-direction:column;gap:4px;margin-bottom:24px}
.step-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius);background:var(--c-surface2);font-size:13px;cursor:pointer;transition:background .2s}
.step-item:hover{background:var(--c-border)}
.step-item.expanded{border-radius:var(--radius) var(--radius) 0 0;background:var(--c-border)}
.step-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.step-item.pending .step-icon{border:2px solid var(--c-pending);color:var(--c-text2)}
.step-item.in-progress .step-icon{border:2px solid var(--c-primary);color:var(--c-primary);animation:pulse 2s infinite}
.step-item.completed .step-icon{border:none;background:var(--c-success);color:#fff}
.step-item.blocked .step-icon{border:2px solid var(--c-danger);color:var(--c-danger)}
.step-item.skipped .step-icon{border:2px solid var(--c-skipped);color:var(--c-text2)}
.step-name{flex:1}
.step-detail-inline{font-size:11px;color:var(--c-text2);max-width:40%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.step-time{font-size:11px;color:var(--c-text2);white-space:nowrap}
.step-expand{font-size:10px;color:var(--c-text2);transition:transform .2s}
.step-item.expanded .step-expand{transform:rotate(90deg)}

/* Step detail panel */
.step-detail-panel{display:none;padding:12px 16px;background:var(--c-surface2);border-radius:0 0 var(--radius) var(--radius);margin-bottom:4px;font-size:13px;border-top:1px solid var(--c-border)}
.step-detail-panel.open{display:block}
.detail-section{margin-bottom:12px}
.detail-section:last-child{margin-bottom:0}
.detail-label{font-size:11px;color:var(--c-text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.detail-value{color:var(--c-text);line-height:1.6}
.detail-value p{margin:4px 0}
.detail-timing{display:flex;gap:16px;flex-wrap:wrap}
.detail-timing-item{display:flex;flex-direction:column;gap:2px}
.detail-timing-item .detail-label{margin-bottom:0}
.detail-result{background:rgba(0,0,0,.2);border-radius:4px;padding:10px 12px;white-space:pre-wrap;word-break:break-word;max-height:300px;overflow-y:auto;line-height:1.6}
.detail-artifacts{display:flex;flex-wrap:wrap;gap:6px}
.detail-artifact-link{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;background:rgba(79,140,255,.1);color:var(--c-primary);font-size:12px;cursor:pointer;text-decoration:none;transition:background .2s}
.detail-artifact-link:hover{background:rgba(79,140,255,.2)}

/* Artifacts */
.artifacts h3{font-size:14px;margin-bottom:10px;color:var(--c-text2)}
.artifact-list{display:flex;flex-direction:column;gap:4px;margin-bottom:24px}
.artifact-item{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:var(--radius);font-size:13px;cursor:pointer;background:var(--c-surface2);transition:background .2s}
.artifact-item:hover{background:var(--c-border)}
.artifact-icon{font-size:14px}
.artifact-name{flex:1}
.artifact-type{font-size:10px;padding:2px 6px;border-radius:10px;background:var(--c-border);color:var(--c-text2)}

/* Consensus tracker */
.tracker-panel h3{font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.convergence-badge{font-size:11px;padding:2px 8px;border-radius:10px}
.convergence-badge.converging{background:rgba(52,211,153,.15);color:var(--c-success)}
.convergence-badge.stalled{background:rgba(251,191,36,.15);color:var(--c-warning)}
.convergence-badge.diverging{background:rgba(248,113,113,.15);color:var(--c-danger)}
.tracker-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px}
.tracker-table th{text-align:left;padding:6px 8px;border-bottom:1px solid var(--c-border);color:var(--c-text2);font-weight:500}
.tracker-table td{padding:6px 8px;border-bottom:1px solid rgba(45,45,74,.5)}
.tracker-table tr.current-round{background:rgba(79,140,255,.1)}
.tracker-table tr.clickable{cursor:pointer;transition:background .15s}
.tracker-table tr.clickable:hover{background:rgba(79,140,255,.08)}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:60px;padding:4px 0;margin-bottom:8px}
.bar{display:flex;flex-direction:column;justify-content:flex-end;min-width:28px;border-radius:3px 3px 0 0;transition:height .3s}
.bar-fatal{background:var(--c-danger)}
.bar-high{background:var(--c-warning)}
.bar-label{font-size:10px;color:var(--c-text2);text-align:center}

/* Tracker detail panel */
.tracker-detail-panel{display:none;padding:10px 12px;background:rgba(0,0,0,.15);border-radius:var(--radius);margin-bottom:10px;font-size:12px;line-height:1.7}
.tracker-detail-panel.open{display:block}
.tracker-detail-panel .detail-section{margin-bottom:8px}
.tracker-detail-panel .detail-section:last-child{margin-bottom:0}
.tracker-detail-panel .detail-label{font-size:10px}
.tracker-detail-panel .detail-value{font-size:12px}
.issue-list{display:flex;flex-direction:column;gap:3px}
.issue-item{display:flex;align-items:center;gap:6px;padding:3px 0}
.issue-severity{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:500}
.issue-severity.fatal{background:rgba(248,113,113,.2);color:var(--c-danger)}
.issue-severity.high{background:rgba(251,191,36,.2);color:var(--c-warning)}
.issue-severity.medium{background:rgba(96,165,250,.2);color:var(--c-info)}
.issue-severity.low{background:rgba(136,136,168,.2);color:var(--c-text2)}

/* Bug tracker */
.bug-bar-chart{display:flex;align-items:flex-end;gap:6px;height:60px;padding:4px 0;margin-bottom:8px}
.bug-bar{min-width:28px;border-radius:3px 3px 0 0;transition:height .3s}
.bug-bar.remaining{background:var(--c-danger)}
.bug-bar.fixed{background:var(--c-success)}

/* Activity log */
.activity-log h3{font-size:14px;margin-bottom:10px}
.log-list{display:flex;flex-direction:column;gap:2px;max-height:300px;overflow-y:auto;font-size:12px}
.log-entry{display:flex;gap:8px;padding:4px 8px;border-radius:4px;cursor:pointer;animation:fadeIn .3s;transition:background .15s}
.log-entry:hover{background:var(--c-surface2)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.log-time{color:var(--c-text2);white-space:nowrap;font-family:monospace;font-size:11px}
.log-phase{width:20px;text-align:center;flex-shrink:0;font-size:11px}
.log-msg{flex:1;color:var(--c-text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.log-level{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:6px}
.log-level.info{background:var(--c-info)}
.log-level.warning{background:var(--c-warning)}
.log-level.error{background:var(--c-danger)}
.log-level.success{background:var(--c-success)}

/* Log detail panel */
.log-detail-panel{display:none;padding:8px 12px;margin:2px 8px;background:var(--c-surface2);border-radius:4px;font-size:12px;line-height:1.6;border-left:3px solid var(--c-primary)}
.log-detail-panel.open{display:block}
.log-detail-panel .log-detail-action{color:var(--c-text2);font-size:11px;margin-bottom:4px}
.log-detail-panel .log-detail-msg{color:var(--c-text);white-space:pre-wrap;word-break:break-word}

/* Artifact preview modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;padding:24px}
.modal-overlay.open{display:flex}
.modal{background:var(--c-surface);border-radius:var(--radius);width:100%;max-width:1000px;height:80vh;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--c-border)}
.modal-header h3{font-size:14px;display:flex;align-items:center;gap:8px}
.modal-close{background:none;border:none;color:var(--c-text2);font-size:20px;cursor:pointer;padding:4px 8px}
.modal-close:hover{color:var(--c-text)}
.modal-header-actions{display:flex;align-items:center;gap:4px}
.modal-btn{background:none;border:none;color:var(--c-text2);cursor:pointer;padding:4px 8px;border-radius:4px;font-size:16px;line-height:1;transition:all .15s}
.modal-btn:hover{color:var(--c-text);background:rgba(255,255,255,.06)}
.modal-btn svg{width:16px;height:16px;fill:currentColor;vertical-align:middle}
.modal-overlay.fullscreen .modal{max-width:100%;height:100%;border-radius:0}
.modal-overlay.fullscreen{padding:0;background:rgba(0,0,0,.85)}
.modal-body{flex:1;overflow:hidden;background:#fff}
.modal-body iframe{width:100%;height:100%;border:none;background:#fff}
.type-badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.type-badge.html{background:rgba(79,140,255,.15);color:var(--c-primary)}
.type-badge.markdown{background:rgba(52,211,153,.15);color:var(--c-success)}
.type-badge.json{background:rgba(251,191,36,.15);color:var(--c-warning)}
.type-badge.other{background:rgba(136,136,168,.15);color:var(--c-text2)}
.modal-loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--c-text2);font-size:14px}
.modal-loading .spinner{width:32px;height:32px;border:3px solid var(--c-border);border-top-color:var(--c-primary);border-radius:50%;animation:spin 1s linear infinite;margin-right:12px}
.modal-error{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--c-danger);font-size:14px;gap:8px}
.modal-error button{padding:6px 16px;border-radius:6px;border:1px solid var(--c-border);background:var(--c-surface2);color:var(--c-text);cursor:pointer;font-size:13px}
.modal-error button:hover{border-color:var(--c-primary)}

/* Markdown rendered content */
.md-content{padding:32px;overflow-y:auto;height:100%;color:#1a1a2e;font-size:15px;line-height:1.7}
.md-content h1{font-size:2em;font-weight:600;border-bottom:1px solid #d0d7de;padding-bottom:.3em;margin:0 0 16px}
.md-content h2{font-size:1.5em;font-weight:600;border-bottom:1px solid #d0d7de;padding-bottom:.3em;margin:24px 0 12px}
.md-content h3{font-size:1.25em;font-weight:600;margin:16px 0 8px}
.md-content h4{font-size:1em;font-weight:600;margin:16px 0 8px}
.md-content p{margin:8px 0}
.md-content a{color:#0969da;text-decoration:none}
.md-content a:hover{text-decoration:underline}
.md-content code{background:#eff1f3;padding:2px 6px;border-radius:3px;font-size:.875em;font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace}
.md-content pre{background:#1b1f24;color:#e6edf3;padding:16px;border-radius:6px;overflow-x:auto;margin:12px 0}
.md-content pre code{background:none;padding:0;color:inherit;font-size:.875em}
.md-content table{border-collapse:collapse;width:100%;margin:12px 0}
.md-content th,.md-content td{border:1px solid #d0d7de;padding:8px 12px;text-align:left}
.md-content th{background:#f6f8fa;font-weight:600}
.md-content blockquote{border-left:4px solid #d0d7de;color:#656d76;padding:0 1em;margin:8px 0}
.md-content ul,.md-content ol{padding-left:2em;margin:8px 0}
.md-content li{margin:4px 0}
.md-content .task-list-item{list-style:none;margin-left:-1.2em}
.md-content del{color:#656d76;text-decoration:line-through}
.md-content hr{border:none;border-top:1px solid #d0d7de;margin:24px 0}
.md-content img{max-width:100%}

/* JSON tree rendered content */
.json-content{padding:20px;overflow-y:auto;height:100%;color:#1a1a2e;font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;font-size:13px;line-height:1.8}
.json-key{color:#0a3069;font-weight:600}
.json-string{color:#0a3069}
.json-number{color:#0550ae}
.json-bool{color:#cf222e}
.json-null{color:#6e7781;font-style:italic}
.json-bracket{color:#656d76}
.json-toggle{cursor:pointer;user-select:none;display:inline-block;width:16px;text-align:center;color:#656d76;font-size:11px;transition:color .15s}
.json-toggle:hover{color:#0969da}
.json-count{color:#656d76;font-size:11px;margin-left:4px}
.json-children{margin-left:20px}
.json-children.collapsed{display:none}
.json-row{white-space:nowrap}
.json-row:hover{background:rgba(9,105,218,.04);border-radius:3px}

/* Plain text content */
.plain-content{padding:20px;overflow-y:auto;height:100%;background:#fff;color:#1a1a2e;font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}

/* Empty state */
.empty-state{text-align:center;padding:60px 24px;color:var(--c-text2)}
.empty-state p{font-size:14px;margin-top:8px}
.empty-state .spinner{width:40px;height:40px;border:3px solid var(--c-border);border-top-color:var(--c-primary);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Question panel */
.question-panel{background:rgba(79,140,255,.08);border:2px solid var(--c-primary);border-radius:var(--radius);padding:20px;margin-bottom:20px;animation:questionSlideIn .4s ease-out,questionGlow 2s ease-in-out infinite}
.question-panel.answered{border-color:var(--c-success);animation:none;background:rgba(52,211,153,.08)}
@keyframes questionSlideIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}
@keyframes questionGlow{0%,100%{box-shadow:0 0 0 0 rgba(79,140,255,.3)}50%{box-shadow:0 0 20px 4px rgba(79,140,255,.2)}}
.question-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.question-icon{width:24px;height:24px;border-radius:50%;background:var(--c-primary);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:600;flex-shrink:0}
.question-panel.answered .question-icon{background:var(--c-success)}
.question-title{font-size:15px;font-weight:600;color:var(--c-primary)}
.question-panel.answered .question-title{color:var(--c-success)}
.answered-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:12px;font-size:12px;background:rgba(52,211,153,.15);color:var(--c-success);margin-left:8px}
.question-text{font-size:14px;margin-bottom:16px;line-height:1.6}
.question-panel.answered .question-text{text-decoration:line-through;opacity:.6}
.answered-time{font-size:12px;color:var(--c-text2);margin-top:8px}
.q-option-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.q-option{padding:10px 14px;border-radius:6px;border:1px solid var(--c-border);background:var(--c-surface2);cursor:pointer;transition:all .2s;font-size:13px;display:flex;align-items:flex-start;gap:10px}
.q-option:hover{border-color:var(--c-primary);background:rgba(79,140,255,.05)}
.q-option.selected{border-color:var(--c-primary);background:rgba(79,140,255,.15)}
.q-option-radio{width:16px;height:16px;border:2px solid var(--c-border);border-radius:50%;flex-shrink:0;margin-top:1px;position:relative;transition:border-color .2s}
.q-option.selected .q-option-radio{border-color:var(--c-primary)}
.q-option.selected .q-option-radio::after{content:'';position:absolute;top:3px;left:3px;width:6px;height:6px;border-radius:50%;background:var(--c-primary)}
.q-option-checkbox{width:16px;height:16px;border:2px solid var(--c-border);border-radius:3px;flex-shrink:0;margin-top:1px;position:relative;transition:all .2s}
.q-option.selected .q-option-checkbox{border-color:var(--c-primary);background:var(--c-primary)}
.q-option.selected .q-option-checkbox::after{content:'✓';position:absolute;top:-2px;left:2px;font-size:12px;color:#fff;font-weight:700}
.q-option-content{flex:1}
.q-option-label{font-weight:500;margin-bottom:2px}
.q-option-desc{font-size:12px;color:var(--c-text2)}
.q-other-input{margin-bottom:16px;padding:8px 12px;border-radius:6px;border:1px solid var(--c-border);background:var(--c-surface2);color:var(--c-text);font-size:13px;width:100%;outline:none;font-family:inherit}
.q-other-input:focus{border-color:var(--c-primary)}
.q-other-input::placeholder{color:var(--c-text2)}
.question-actions{display:flex;align-items:center;gap:12px}
.q-submit-btn{padding:8px 24px;border-radius:6px;background:var(--c-primary);color:#fff;border:none;font-size:14px;cursor:pointer;transition:opacity .2s;font-family:inherit}
.q-submit-btn:hover{opacity:.85}
.q-submit-btn:disabled{opacity:.4;cursor:not-allowed}
.q-submit-btn.q-submit-partial{opacity:.7}
.q-submit-hint{font-size:11px;color:var(--c-text2)}

/* Question tabs */
.q-tabs{display:flex;gap:4px;margin-bottom:12px;border-bottom:1px solid var(--c-border);padding-bottom:0}
.q-tab{padding:6px 14px;border:none;background:none;color:var(--c-text2);cursor:pointer;font-size:13px;font-family:inherit;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:4px;border-radius:4px 4px 0 0}
.q-tab:hover{color:var(--c-text);background:rgba(79,140,255,.05)}
.q-tab.active{color:var(--c-primary);border-bottom-color:var(--c-primary);font-weight:600}
.q-tab.answered .q-tab-check{color:var(--c-success);font-size:11px}
.q-tab-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}

/* Notification indicator in header */
.notif-indicator{cursor:pointer;position:relative;display:none}
.notif-dot{width:10px;height:10px;border-radius:50%;background:var(--c-warning);animation:notifBlink 1s infinite;display:inline-block}
@keyframes notifBlink{50%{opacity:.3}}

/* Global question panel (between header and timeline) */
.question-panel-global{background:var(--c-surface);border-bottom:2px solid var(--c-primary);padding:0 24px;animation:questionSlideIn .4s ease-out}
.question-panel-global.has-question{padding:16px 24px;box-shadow:0 4px 16px rgba(79,140,255,.2)}
.question-panel-global.answered{border-color:var(--c-success);box-shadow:0 4px 16px rgba(52,211,153,.15)}

/* Header glow bar when question is pending */
.header.has-question{box-shadow:inset 0 -2px 8px rgba(79,140,255,.4)}

/* Sound toggle */
.sound-toggle{background:none;border:none;color:var(--c-text2);cursor:pointer;padding:2px 6px;border-radius:4px;font-size:14px;line-height:1;vertical-align:middle;margin-left:8px;transition:color .2s}
.sound-toggle:hover{color:var(--c-text)}
.sound-toggle.on{color:var(--c-primary)}

/* Responsive */
@media(max-width:1024px){
  .main{flex-direction:column}
  .panel-side{width:100%;border-top:1px solid var(--c-border)}
  .panel-main{border-right:none}
}

<body>

        </button>
        <button class="modal-btn" id="modalFullscreenExit" title="退出全屏" style="display:none">
          <svg viewBox="0 0 16 16"><path d="M5.5 1v3.5H2V6h5V1H5.5zm5 0v3.5h3.5V6H10V1h-.5zM2 10v1.5h3.5V15H6v-5H2zm9.5 1.5V15H10v-1h.5V10H15v1.5h-3.5z"/></svg>

<script>
const PHASES = [
  { id: 0, name: '规范生成', fullName: '项目规范生成', skill: 'instruction-skill' },
  { id: 1, name: '需求分析', fullName: '需求分析', skill: 'req-analysis-skill' },
  { id: 2, name: 'UI/UX设计', fullName: 'UI/UX设计', skill: 'design-skill' },
  { id: 3, name: '实现评估', fullName: '实现评估（共识闭环）', skill: 'review-skill' },
  { id: 4, name: '任务拆分', fullName: '任务拆分', skill: 'task-allocation-skill' },
  { id: 5, name: '测试用例', fullName: '测试用例编写', skill: 'test-skill' },
  { id: 6, name: 'TDD开发', fullName: 'TDD开发实现', skill: 'dev-skill' },
  { id: 7, name: '测试验证', fullName: '测试验证', skill: 'test-skill' },
];

const STEP_ICONS = {
  pending: '○',
  'in-progress': '◎',
  completed: '✓',
  blocked: '✗',
  skipped: '—',
};

let prevState = null;
let selectedPhase = null;
let reconnectDelay = 1000;
let expandedSteps = new Set();
let expandedLogs = new Set();
let expandedTrackerRounds = new Set();
let selectedOptions = new Map(); // questionId → Set of selected values
let activeQuestionTab = 0;
let notificationPermissionRequested = false;

// ── SSE Connection ──────────────────────────────────
let sseEventCount = 0;
function connectSSE() {
  console.log('[DWS] SSE connecting...');
  const es = new EventSource('/events');

  es.onopen = () => {
    console.log('[DWS] SSE connected');
    setConnected(true);
  };

  es.addEventListener('state', (e) => {
    sseEventCount++;
    try {
      const state = JSON.parse(e.data);
      console.log('[DWS] SSE state event #' + sseEventCount, 'phase:', state.currentPhase, 'status:', state.overallStatus);
      renderState(state);
      prevState = state;
      setConnected(true);
      reconnectDelay = 1000;
      updateLastRefresh();
    } catch (err) {
      console.error('[DWS] SSE render error:', err);
    }
  });

  es.addEventListener('error', (e) => {
    try {
      const data = JSON.parse(e.data);
      console.warn('[DWS] SSE server error:', data.message);
    } catch {}
  });

  es.onerror = () => {
    console.warn('[DWS] SSE connection lost, reconnecting in', reconnectDelay + 'ms');
    setConnected(false);
    es.close();
    setTimeout(() => {
      reconnectDelay = Math.min(reconnectDelay * 2, 30000);
      connectSSE();
    }, reconnectDelay);
  };
}

function updateLastRefresh() {
  const el = document.getElementById('lastRefresh');
  if (el) el.textContent = new Date().toLocaleTimeString();
}

function setConnected(connected) {
  const dot = document.getElementById('connDot');
  dot.className = 'conn-dot ' + (connected ? 'connected' : 'disconnected');
}

// ── Render ──────────────────────────────────────────
function renderState(state) {
  const emptyEl = document.getElementById('emptyState');
  if (emptyEl) emptyEl.style.display = 'none';
  document.getElementById('projectName').textContent = state.projectName || 'DWS Dashboard';

  // Show dashboard URL link if available
  if (state.dashboardUrl) {
    const link = document.getElementById('dashboardUrlLink');
    if (link) { link.href = state.dashboardUrl; link.style.display = 'inline'; }
  }

  // Status badge
  const badge = document.getElementById('statusBadge');
  const statusText = {
    'not-started': '未开始', 'in-progress': '进行中', 'blocked': '已阻塞',
    'consensus-loop': '共识闭环', 'tdd-loop': 'TDD闭环',
    'completed': '已完成', 'failed': '失败'
  };
  badge.textContent = statusText[state.overallStatus] || state.overallStatus;
  badge.className = 'status-badge ' + (state.overallStatus || 'not-started');

  // Phase label
  const currentPhaseData = PHASES[state.currentPhase];
  document.getElementById('phaseLabel').textContent = currentPhaseData
    ? `${currentPhaseData.fullName}${state.currentIteration > 1 ? ' (迭代 ' + state.currentIteration + ')' : ''}`
    : '';

  renderTimeline(state);
  renderGlobalQuestionPanel(state);
  renderPhaseDetail(state);
  renderSidePanel(state);
  handleQuestionNotification(state);
}

function renderTimeline(state) {
  const el = document.getElementById('timeline');
  const phases = state.phases || [];
  let html = '';

  phases.forEach((p, i) => {
    if (i > 0) {
      const prevCompleted = phases[i - 1]?.status === 'completed';
      html += `<div class="phase-connector${prevCompleted ? ' completed' : ''}"></div>`;
    }
    const active = p.id === state.currentPhase;
    html += `<div class="phase-node ${p.status}${active ? ' active' : ''}" data-phase="${p.id}" onclick="selectPhase(${p.id})">
      <div class="phase-circle">${p.id}</div>
      <div class="phase-name">${PHASES[p.id]?.name || p.name}</div>
    </div>`;
  });

  el.innerHTML = html;
}

// ── Global question panel ───────────────────────────
let questionAutoHideTimer = null;
let soundEnabled = false;

function renderGlobalQuestionPanel(state) {
  const panel = document.getElementById('questionPanel');
  const header = document.querySelector('.header');
  const q = state.pendingQuestion;

  if (!q || q.status === 'answered') {
    // Show answered state briefly then hide
    if (q && q.status === 'answered' && panel.classList.contains('has-question')) {
      panel.classList.remove('has-question');
      panel.classList.add('answered');
      panel.innerHTML = renderQuestionPanel(q);
      header.classList.remove('has-question');
      // Auto-hide after 3s
      if (questionAutoHideTimer) clearTimeout(questionAutoHideTimer);
      questionAutoHideTimer = setTimeout(() => {
        panel.style.display = 'none';
        panel.classList.remove('answered');
        panel.innerHTML = '';
        selectedOptions.clear();
        activeQuestionTab = 0;
        window._customTexts = {};
      }, 3000);
    } else if (!q) {
      panel.style.display = 'none';
      panel.classList.remove('has-question', 'answered');
      panel.innerHTML = '';
      header.classList.remove('has-question');
      selectedOptions.clear();
      activeQuestionTab = 0;
      window._customTexts = {};
    }
    return;
  }

  // New question: reset selection state if question ID changed
  if (prevPendingQuestion?.id !== q.id) {
    selectedOptions.clear();
    activeQuestionTab = 0;
    window._customTexts = {};
  }

  // Pending question
  if (questionAutoHideTimer) { clearTimeout(questionAutoHideTimer); questionAutoHideTimer = null; }
  panel.style.display = 'block';
  panel.classList.add('has-question');
  panel.classList.remove('answered');
  header.classList.add('has-question');
  panel.innerHTML = renderQuestionPanel(q);
}

function scrollToQuestion() {
  const panel = document.getElementById('questionPanel');
  if (panel && panel.style.display !== 'none') {
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// ── Sound notification ──────────────────────────────
function playQuestionSound() {
  if (!soundEnabled) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    osc.type = 'sine';
    gain.gain.value = 0.15;
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.stop(ctx.currentTime + 0.3);
  } catch {}
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('soundToggle');
  if (btn) {
    btn.textContent = soundEnabled ? '🔊' : '🔇';
    btn.classList.toggle('on', soundEnabled);
  }
  if (soundEnabled) playQuestionSound(); // test
}

// ── Keyboard shortcuts ──────────────────────────────
document.addEventListener('keydown', (e) => {
  const q = prevState?.pendingQuestion;
  if (!q || q.status !== 'pending') return;

  // Get active question for shortcuts
  const hasMulti = q.questions && Array.isArray(q.questions) && q.questions.length > 0;
  const aq = hasMulti ? (q.questions[activeQuestionTab] || q.questions[0]) : q;

  // 1-9 to select options
  const num = parseInt(e.key);
  if (num >= 1 && num <= 9 && num <= (aq.options || []).length) {
    e.preventDefault();
    toggleQuestionOption(aq.id || 'q-0', aq.options[num - 1].value, !!aq.multiSelect);
  }

  // Enter to submit
  if (e.key === 'Enter' && !e.target.classList.contains('q-other-input')) {
    e.preventDefault();
    submitQuestionAnswer(q.id);
  }
});

function selectPhase(id) {
  selectedPhase = id;
  expandedSteps.clear();
  if (prevState) renderPhaseDetail(prevState);
}

function renderPhaseDetail(state) {
  const el = document.getElementById('panelMain');
  const phaseId = selectedPhase !== null ? selectedPhase : state.currentPhase;
  const phase = (state.phases || []).find(p => p.id === phaseId);

  if (!phase) {
    el.innerHTML = '<div class="empty-state"><p>无阶段数据</p></div>';
    return;
  }

  let html = '';

  html += `<div class="phase-detail">
    <h2>${PHASES[phase.id]?.fullName || phase.name}</h2>
    <div class="phase-meta">${phase.skill} &middot; ${statusLabel(phase.status)}`;
  if (phase.startedAt) html += ` &middot; 开始: ${fmtTime(phase.startedAt)}`;
  if (phase.completedAt) html += ` &middot; 完成: ${fmtTime(phase.completedAt)}`;
  html += '</div>';

  // Steps with expandable detail panels
  if (phase.steps && phase.steps.length > 0) {
    html += '<div class="step-list">';
    phase.steps.forEach(step => {
      const isExpanded = expandedSteps.has(step.id);
      const hasDetail = step.detail || step.result || step.startedAt;
      html += `<div class="step-item ${step.status}${isExpanded ? ' expanded' : ''}" onclick="toggleStep('${step.id}')">
        <div class="step-icon">${STEP_ICONS[step.status] || ''}</div>
        <span class="step-name">${step.name}</span>
        ${step.detail ? `<span class="step-detail-inline">${escHtml(step.detail)}</span>` : ''}
        ${step.status !== 'pending' ? `<span class="step-time">${fmtDuration(step.startedAt, step.completedAt)}</span>` : ''}
        ${hasDetail ? '<span class="step-expand">&#9654;</span>' : ''}
      </div>`;

      // Detail panel
      html += `<div class="step-detail-panel${isExpanded ? ' open' : ''}" id="detail-${step.id}">`;
      // Timing
      if (step.startedAt) {
        html += '<div class="detail-section"><div class="detail-timing">';
        html += `<div class="detail-timing-item"><div class="detail-label">开始</div><div class="detail-value">${fmtTimeFull(step.startedAt)}</div></div>`;
        if (step.completedAt) {
          html += `<div class="detail-timing-item"><div class="detail-label">完成</div><div class="detail-value">${fmtTimeFull(step.completedAt)}</div></div>`;
          html += `<div class="detail-timing-item"><div class="detail-label">耗时</div><div class="detail-value">${fmtDuration(step.startedAt, step.completedAt)}</div></div>`;
        }
        html += '</div></div>';
      }
      // Detail text
      if (step.detail) {
        html += `<div class="detail-section"><div class="detail-label">描述</div><div class="detail-value">${escHtml(step.detail)}</div></div>`;
      }
      // Result content
      if (step.result) {
        html += `<div class="detail-section"><div class="detail-label">执行结果</div><div class="detail-result">${renderResultContent(step.result)}</div></div>`;
      }
      // Related artifacts from this phase
      if (phase.artifacts && phase.artifacts.length > 0) {
        html += '<div class="detail-section"><div class="detail-label">阶段产物</div><div class="detail-artifacts">';
        phase.artifacts.forEach(a => {
          const icon = a.type === 'html' ? '&#128196;' : a.type === 'markdown' ? '&#128221;' : '&#128206;';
          html += `<a class="detail-artifact-link" onclick="event.stopPropagation();openArtifact('${escAttr(a.path)}','${a.type}','${escAttr(a.name)}')">${icon} ${a.name}</a>`;
        });
        html += '</div></div>';
      }
      html += '</div>';
    });
    html += '</div>';
  }

  // Artifacts
  if (phase.artifacts && phase.artifacts.length > 0) {
    html += '<div class="artifacts"><h3>产物</h3><div class="artifact-list">';
    phase.artifacts.forEach(a => {
      const icon = a.type === 'html' ? '&#128196;' : a.type === 'markdown' ? '&#128221;' : '&#128206;';
      html += `<div class="artifact-item" onclick="openArtifact('${escAttr(a.path)}','${a.type}','${escAttr(a.name)}')">
        <span class="artifact-icon">${icon}</span>
        <span class="artifact-name">${a.name}</span>
        <span class="artifact-type">${a.type}</span>
      </div>`;
    });
    html += '</div></div>';
  }

  html += '</div>';
  el.innerHTML = html;
}

function toggleStep(stepId) {
  if (expandedSteps.has(stepId)) {
    expandedSteps.delete(stepId);
  } else {
    expandedSteps.add(stepId);
  }
  // Toggle DOM directly for responsiveness
  const item = document.querySelector(`.step-item[onclick*="${stepId}"]`);
  const panel = document.getElementById(`detail-${stepId}`);
  if (item && panel) {
    item.classList.toggle('expanded');
    panel.classList.toggle('open');
  }
}

function renderResultContent(result) {
  if (!result) return '';
  // If result is a string, render as pre-wrapped text with basic markdown
  if (typeof result === 'string') {
    return escHtml(result);
  }
  // If result is an object with structured data
  let html = '';
  if (result.summary) {
    html += `<p>${escHtml(result.summary)}</p>`;
  }
  if (result.items && Array.isArray(result.items)) {
    html += '<ul style="margin:4px 0;padding-left:20px">';
    result.items.forEach(item => {
      html += `<li>${escHtml(typeof item === 'string' ? item : item.text || JSON.stringify(item))}</li>`;
    });
    html += '</ul>';
  }
  if (result.metrics && typeof result.metrics === 'object') {
    html += '<div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:6px">';
    Object.entries(result.metrics).forEach(([key, val]) => {
      html += `<div style="background:rgba(0,0,0,.2);padding:4px 8px;border-radius:4px"><span style="color:var(--c-text2);font-size:11px">${escHtml(key)}</span> <strong>${escHtml(String(val))}</strong></div>`;
    });
    html += '</div>';
  }
  if (result.errors && Array.isArray(result.errors) && result.errors.length > 0) {
    html += '<div style="margin-top:6px;color:var(--c-danger)">';
    result.errors.forEach(err => { html += `<div>${escHtml(typeof err === 'string' ? err : err.message || JSON.stringify(err))}</div>`; });
    html += '</div>';
  }
  return html || escHtml(JSON.stringify(result, null, 2));
}

function renderSidePanel(state) {
  const el = document.getElementById('panelSide');
  let html = '';

  // Consensus tracker (Phase 3)
  if (state.consensusTracker && state.consensusTracker.rounds.length > 0) {
    const ct = state.consensusTracker;
    html += '<div class="tracker-panel"><h3>共识闭环 ';
    const convergence = getConvergence(ct.rounds);
    html += `<span class="convergence-badge ${convergence}">${convergenceLabel(convergence)}</span></h3>`;

    html += '<table class="tracker-table"><tr><th>轮次</th><th>致命</th><th>高</th><th>中</th><th>低</th><th>需求调整</th><th>设计调整</th></tr>';
    ct.rounds.forEach(r => {
      const isCurrent = r.round === ct.currentRound;
      const roundKey = `consensus-${r.round}`;
      const isExpanded = expandedTrackerRounds.has(roundKey);
      html += `<tr class="clickable${isCurrent ? ' current-round' : ''}" onclick="toggleTrackerRound('${roundKey}')">
        <td>${r.round}</td><td>${r.fatalIssues}</td><td>${r.highIssues}</td><td>${r.mediumIssues || '-'}</td><td>${r.lowIssues || '-'}</td><td>${r.reqAdjustments}</td><td>${r.designAdjustments}</td></tr>`;
    });
    html += '</table>';

    // Expandable detail panels for each round
    ct.rounds.forEach(r => {
      const roundKey = `consensus-${r.round}`;
      const isExpanded = expandedTrackerRounds.has(roundKey);
      html += `<div class="tracker-detail-panel${isExpanded ? ' open' : ''}" id="tracker-${roundKey}">`;
      html += `<div class="detail-section"><div class="detail-label">第 ${r.round} 轮状态</div><div class="detail-value">${r.status === 'consensus-reached' ? '✓ 共识达成' : '共识未达成'}</div></div>`;
      // Issue breakdown
      const total = (r.fatalIssues || 0) + (r.highIssues || 0) + (r.mediumIssues || 0) + (r.lowIssues || 0);
      html += '<div class="detail-section"><div class="detail-label">问题分布</div><div class="issue-list">';
      if (r.fatalIssues > 0) html += `<div class="issue-item"><span class="issue-severity fatal">致命</span> ${r.fatalIssues} 个</div>`;
      if (r.highIssues > 0) html += `<div class="issue-item"><span class="issue-severity high">高</span> ${r.highIssues} 个</div>`;
      if (r.mediumIssues > 0) html += `<div class="issue-item"><span class="issue-severity medium">中</span> ${r.mediumIssues} 个</div>`;
      if (r.lowIssues > 0) html += `<div class="issue-item"><span class="issue-severity low">低</span> ${r.lowIssues} 个</div>`;
      if (total === 0) html += '<div class="issue-item">无问题</div>';
      html += '</div></div>';
      // Adjustments
      html += `<div class="detail-section"><div class="detail-label">调整</div><div class="detail-value">需求调整 ${r.reqAdjustments} 项，设计调整 ${r.designAdjustments} 项</div></div>`;
      // Round-specific detail
      if (r.details) {
        html += `<div class="detail-section"><div class="detail-label">详情</div><div class="detail-result">${renderResultContent(r.details)}</div></div>`;
      }
      html += '</div>';
    });

    // Bar chart
    const maxIssues = Math.max(...ct.rounds.map(r => r.fatalIssues + r.highIssues), 1);
    html += '<div class="bar-chart">';
    ct.rounds.forEach(r => {
      const fatalH = (r.fatalIssues / maxIssues) * 56;
      const highH = (r.highIssues / maxIssues) * 56;
      html += `<div style="display:flex;flex-direction:column;align-items:center"><div class="bar" style="height:${fatalH + highH}px"><div class="bar-fatal" style="height:${fatalH}px"></div><div class="bar-high" style="height:${highH}px"></div></div><div class="bar-label">R${r.round}</div></div>`;
    });
    html += '</div>';
    html += '</div>';
  }

  // Bug tracker (Phases 6-7)
  if (state.bugTracker && state.bugTracker.rounds.length > 0) {
    const bt = state.bugTracker;
    html += '<div class="tracker-panel"><h3>Bug 跟踪 ';
    const convergence = getBugConvergence(bt.rounds);
    html += `<span class="convergence-badge ${convergence}">${convergenceLabel(convergence)}</span></h3>`;

    html += '<table class="tracker-table"><tr><th>轮次</th><th>新增</th><th>已修复</th><th>剩余</th></tr>';
    bt.rounds.forEach(r => {
      const isCurrent = r.round === bt.currentRound;
      const roundKey = `bug-${r.round}`;
      html += `<tr class="clickable${isCurrent ? ' current-round' : ''}" onclick="toggleTrackerRound('${roundKey}')">
        <td>${r.round}</td><td>${r.newBugs}</td><td>${r.fixedBugs}</td><td>${r.remainingBugs}</td></tr>`;
    });
    html += '</table>';

    // Expandable detail panels for each bug round
    bt.rounds.forEach(r => {
      const roundKey = `bug-${r.round}`;
      const isExpanded = expandedTrackerRounds.has(roundKey);
      html += `<div class="tracker-detail-panel${isExpanded ? ' open' : ''}" id="tracker-${roundKey}">`;
      html += `<div class="detail-section"><div class="detail-label">第 ${r.round} 轮 (迭代 ${r.iterationId || '-'})</div></div>`;
      html += '<div class="detail-section"><div class="detail-label">Bug 分布</div><div class="issue-list">';
      if (r.newBugs > 0) html += `<div class="issue-item"><span class="issue-severity high">新增</span> ${r.newBugs} 个</div>`;
      if (r.fixedBugs > 0) html += `<div class="issue-item"><span class="issue-severity medium">已修复</span> ${r.fixedBugs} 个</div>`;
      if (r.remainingBugs > 0) html += `<div class="issue-item"><span class="issue-severity fatal">剩余</span> ${r.remainingBugs} 个</div>`;
      if (r.newBugs === 0 && r.remainingBugs === 0) html += '<div class="issue-item">无 Bug</div>';
      html += '</div></div>';
      if (r.details) {
        html += `<div class="detail-section"><div class="detail-label">详情</div><div class="detail-result">${renderResultContent(r.details)}</div></div>`;
      }
      html += '</div>';
    });

    const maxBugs = Math.max(...bt.rounds.map(r => r.newBugs + r.remainingBugs), 1);
    html += '<div class="bug-bar-chart">';
    bt.rounds.forEach(r => {
      const h = (r.remainingBugs / maxBugs) * 56;
      html += `<div style="display:flex;flex-direction:column;align-items:center"><div class="bug-bar remaining" style="height:${Math.max(h, 2)}px"></div><div class="bar-label">R${r.round}</div></div>`;
    });
    html += '</div>';
    html += '</div>';
  }

  // Activity log
  html += '<div class="activity-log"><h3>Activity Log</h3><div class="log-list" id="logList">';
  const logs = (state.activityLog || []).slice(-50);
  logs.forEach((entry, idx) => {
    const logKey = `log-${idx}`;
    const isExpanded = expandedLogs.has(logKey);
    const isQA = entry.action === 'question-answered';
    html += `<div class="log-entry" onclick="toggleLog('${logKey}')">
      <span class="log-level ${entry.level || 'info'}"></span>
      <span class="log-time">${fmtTime(entry.timestamp)}</span>
      <span class="log-phase">${isQA ? '💬' : entry.phase}</span>
      <span class="log-msg">${isQA ? '💬 ' : ''}${escHtml(entry.message)}</span>
    </div>`;
    html += `<div class="log-detail-panel${isExpanded ? ' open' : ''}" id="log-${logKey}">
      <div class="log-detail-action">${escHtml(entry.action || '')} &middot; 阶段 ${entry.phase}</div>
      <div class="log-detail-msg">${escHtml(entry.message)}</div>
    </div>`;
  });
  html += '</div></div>';

  el.innerHTML = html;

  // Auto-scroll log
  const logList = document.getElementById('logList');
  if (logList) logList.scrollTop = logList.scrollHeight;
}

function toggleTrackerRound(roundKey) {
  if (expandedTrackerRounds.has(roundKey)) {
    expandedTrackerRounds.delete(roundKey);
  } else {
    expandedTrackerRounds.add(roundKey);
  }
  const panel = document.getElementById(`tracker-${roundKey}`);
  if (panel) panel.classList.toggle('open');
}

function toggleLog(logKey) {
  if (expandedLogs.has(logKey)) {
    expandedLogs.delete(logKey);
  } else {
    expandedLogs.add(logKey);
  }
  const panel = document.getElementById(`log-${logKey}`);
  if (panel) panel.classList.toggle('open');
}

// ── Artifact preview ────────────────────────────────
function openArtifact(path, type, name) {
  const overlay = document.getElementById('modalOverlay');
  const body = document.getElementById('modalBody');
  const title = document.getElementById('modalTitle');

  // Build title with type badge
  const badgeClass = type === 'html' ? 'html' : type === 'markdown' ? 'markdown' : type === 'json' ? 'json' : 'other';
  const badgeText = type === 'html' ? 'HTML' : type === 'markdown' ? 'MD' : type === 'json' ? 'JSON' : type.toUpperCase();
  title.innerHTML = `${escHtml(name)} <span class="type-badge ${badgeClass}">${badgeText}</span>`;

  // Show loading state
  body.innerHTML = '<div class="modal-loading"><div class="spinner"></div>加载中...</div>';
  overlay.classList.add('open');

  if (type === 'html') {
    body.innerHTML = `<iframe src="/artifacts/${encodeURIComponent(path)}"></iframe>`;
  } else if (type === 'markdown') {
    fetch(`/artifacts/${encodeURIComponent(path)}`)
      .then(r => { if (!r.ok) throw new Error(r.statusText); return r.text(); })
      .then(text => renderMarkdownContent(text, body))
      .catch(err => renderError(body, err.message, path, type, name));
  } else if (type === 'json') {
    fetch(`/artifacts/${encodeURIComponent(path)}`)
      .then(r => { if (!r.ok) throw new Error(r.statusText); return r.text(); })
      .then(text => {
        try {
          const data = JSON.parse(text);
          renderJsonTree(data, body, 0);
        } catch {
            // Fallback to plain text if JSON parsing fails
          const container = document.createElement('div');
          container.className = 'plain-content';
          container.textContent = text;
          body.innerHTML = '';
          body.appendChild(container);
        }
      })
      .catch(err => renderError(body, err.message, path, type, name));
  } else {
    fetch(`/artifacts/${encodeURIComponent(path)}`)
      .then(r => { if (!r.ok) throw new Error(r.statusText); return r.text(); })
      .then(text => {
        const container = document.createElement('div');
        container.className = 'plain-content';
        container.textContent = text;
        body.innerHTML = '';
        body.appendChild(container);
      })
      .catch(err => renderError(body, err.message, path, type, name));
  }
}

function renderMarkdownContent(text, container) {
  // Configure marked with GFM and highlight.js
  marked.setOptions({
    gfm: true,
    breaks: false,
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        try { return hljs.highlight(code, { language: lang }).value; } catch {}
      }
      try { return hljs.highlightAuto(code).value; } catch {}
      return code;
    }
  });

  const div = document.createElement('div');
  div.className = 'md-content';
  div.innerHTML = marked.parse(text);
  container.innerHTML = '';
  container.appendChild(div);
}

function renderJsonTree(data, container, depth) {
  const div = document.createElement('div');
  div.className = 'json-content';
  div.appendChild(buildJsonNode(data, depth));
  container.innerHTML = '';
  container.appendChild(div);
}

function buildJsonNode(value, depth, key) {
  const fragment = document.createDocumentFragment();

  if (value === null) {
    const row = createJsonRow(key, '<span class="json-null">null</span>');
    fragment.appendChild(row);
  } else if (typeof value === 'boolean') {
    const row = createJsonRow(key, `<span class="json-bool">${value}</span>`);
    fragment.appendChild(row);
  } else if (typeof value === 'number') {
    const row = createJsonRow(key, `<span class="json-number">${value}</span>`);
    fragment.appendChild(row);
  } else if (typeof value === 'string') {
    const row = createJsonRow(key, `<span class="json-string">"${escHtml(value)}"</span>`);
    fragment.appendChild(row);
  } else if (Array.isArray(value)) {
    fragment.appendChild(buildJsonCollapsible(key, value, depth, '[', ']', value.length + ' items'));
  } else if (typeof value === 'object') {
    const keys = Object.keys(value);
    fragment.appendChild(buildJsonCollapsible(key, value, depth, '{', '}', keys.length + ' keys'));
  }

  return fragment;
}

function createJsonRow(key, valueHtml) {
  const row = document.createElement('div');
  row.className = 'json-row';
  let html = '<span class="json-toggle" style="visibility:hidden">&nbsp;</span>';
  if (key !== undefined) {
    const keyStr = typeof key === 'number' ? `<span class="json-number">${key}</span>` : `<span class="json-key">"${escHtml(String(key))}"</span>`;
    html += keyStr + ': ';
  }
  html += valueHtml;
  row.innerHTML = html;
  return row;
}

function buildJsonCollapsible(key, value, depth, openBracket, closeBracket, countText) {
  const wrapper = document.createElement('span');

  // Header row with toggle
  const headerRow = document.createElement('div');
  headerRow.className = 'json-row';
  const isExpanded = depth < 2;
  const toggleChar = isExpanded ? '▼' : '▶';
  let headerHtml = `<span class="json-toggle">${toggleChar}</span>`;
  if (key !== undefined) {
    const keyStr = typeof key === 'number' ? `<span class="json-number">${key}</span>` : `<span class="json-key">"${escHtml(String(key))}"</span>`;
    headerHtml += keyStr + ': ';
  }
  headerHtml += `<span class="json-bracket">${openBracket}</span>`;
  headerHtml += `<span class="json-count" ${isExpanded ? 'style="display:none"' : ''}>${countText}</span>`;
  headerRow.innerHTML = headerHtml;
  wrapper.appendChild(headerRow);

  // Children container
  const childrenDiv = document.createElement('div');
  childrenDiv.className = 'json-children' + (isExpanded ? '' : ' collapsed');

  if (Array.isArray(value)) {
    value.forEach((item, i) => {
      childrenDiv.appendChild(buildJsonNode(item, depth + 1, i));
      // Add comma
      if (i < value.length - 1) {
        const comma = document.createElement('span');
        comma.textContent = ',';
        childrenDiv.lastChild.querySelector('.json-row:last-child, .json-row')?.appendChild(comma);
      }
    });
  } else {
    const keys = Object.keys(value);
    keys.forEach((k, i) => {
      childrenDiv.appendChild(buildJsonNode(value[k], depth + 1, k));
      if (i < keys.length - 1) {
        const lastRow = childrenDiv.lastElementChild;
        if (lastRow) {
          const commaSpan = document.createElement('span');
          commaSpan.textContent = ',';
          lastRow.appendChild(commaSpan);
        }
      }
    });
  }
  wrapper.appendChild(childrenDiv);

  // Closing bracket
  const closeRow = document.createElement('div');
  closeRow.className = 'json-row';
  closeRow.innerHTML = `<span class="json-toggle" style="visibility:hidden">&nbsp;</span><span class="json-bracket">${closeBracket}</span>`;
  wrapper.appendChild(closeRow);

  // Toggle click handler
  const toggle = headerRow.querySelector('.json-toggle');
  const countEl = headerRow.querySelector('.json-count');
  toggle.addEventListener('click', () => {
    const isCollapsed = childrenDiv.classList.contains('collapsed');
    childrenDiv.classList.toggle('collapsed');
    toggle.textContent = isCollapsed ? '▼' : '▶';
    if (countEl) countEl.style.display = isCollapsed ? 'none' : '';
  });

  return wrapper;
}

function renderError(container, message, path, type, name) {
  container.innerHTML = `<div class="modal-error"><div>加载失败: ${escHtml(message)}</div><button onclick="openArtifact('${escAttr(path)}','${escAttr(type)}','${escAttr(name)}')">重试</button></div>`;
}

document.getElementById('modalClose').onclick = () => {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('modalOverlay').classList.remove('fullscreen');
  document.getElementById('modalBody').innerHTML = '';
  updateFullscreenButtons(false);
  // Exit browser fullscreen if active
  if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
};

document.getElementById('modalOverlay').onclick = (e) => {
  if (e.target === e.currentTarget) {
    document.getElementById('modalClose').click();
  }
};

// Fullscreen toggle
function updateFullscreenButtons(isFullscreen) {
  document.getElementById('modalFullscreen').style.display = isFullscreen ? 'none' : '';
  document.getElementById('modalFullscreenExit').style.display = isFullscreen ? '' : 'none';
}

function toggleModalFullscreen() {
  const overlay = document.getElementById('modalOverlay');
  const isFullscreen = overlay.classList.toggle('fullscreen');
  updateFullscreenButtons(isFullscreen);
  // Also use browser Fullscreen API for true fullscreen
  if (isFullscreen) {
    overlay.requestFullscreen?.().catch(() => {});
  } else if (document.fullscreenElement) {
    document.exitFullscreen().catch(() => {});
  }
}

document.getElementById('modalFullscreen').onclick = toggleModalFullscreen;
document.getElementById('modalFullscreenExit').onclick = toggleModalFullscreen;

document.addEventListener('fullscreenchange', () => {
  const overlay = document.getElementById('modalOverlay');
  if (!document.fullscreenElement && overlay.classList.contains('fullscreen')) {
    overlay.classList.remove('fullscreen');
    updateFullscreenButtons(false);
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('modalOverlay').classList.contains('open')) {
    // If in CSS fullscreen (but not browser fullscreen), close modal directly
    // Browser fullscreen: ESC exits fullscreen first, don't close modal simultaneously
    if (!document.fullscreenElement) {
      document.getElementById('modalClose').click();
    }
  }
});

// ── Question panel ──────────────────────────────────
function renderQuestionPanel(q) {
  if (!q) return '';

  // Normalize: support both old format (single question) and new format (questions array)
  const hasMultiQuestions = q.questions && Array.isArray(q.questions) && q.questions.length > 0;
  const questions = hasMultiQuestions ? q.questions : [{
    id: q.id || 'q-0',
    question: q.question || '',
    header: q.header || 'CC 需要你的决策',
    multiSelect: !!q.multiSelect,
    options: q.options || [],
    allowCustom: q.allowCustom !== false
  }];

  const isAnswered = q.status === 'answered';

  let html = `<div class="question-panel${isAnswered ? ' answered' : ''}" role="alert" aria-live="assertive">`;

  if (isAnswered) {
    html += `<div class="question-header">
      <div class="question-icon">✓</div>
      <span class="question-title">已回答</span>`;
    if (q.answer) {
      let answerText = '';
      if (q.answer.answers && Array.isArray(q.answer.answers)) {
        answerText = q.answer.answers.map(a => {
          const qi = questions.find(qq => qq.id === a.questionId);
          const labels = (qi ? qi.options : []).filter(o => (a.selectedValues || []).includes(o.value)).map(o => o.label);
          return labels.join(', ') + (a.customText ? ' + 自定义' : '');
        }).join(' | ');
      } else {
        const labels = (questions[0].options || [])
          .filter(o => (q.answer.selectedValues || []).includes(o.value))
          .map(o => o.label);
        answerText = labels.join(', ') + (q.answer.customText ? ' + 自定义' : '');
      }
      html += `<span class="answered-badge">${escHtml(answerText)}</span>`;
    }
    html += `</div>`;
    // Show each answered question
    for (const qq of questions) {
      html += `<div class="question-text">${escHtml(qq.question)}</div>`;
    }
    if (q.answer && q.answer.answeredAt) {
      html += `<div class="answered-time">回答于 ${fmtTime(q.answer.answeredAt)} · 工作流将继续执行</div>`;
    }
    html += '</div>';
    return html;
  }

  // Pending state
  html += `<div class="question-header">
    <div class="question-icon">?</div>
    <span class="question-title">${escHtml(questions.length > 1 ? `CC 需要你的决策 (${questions.length}个问题)` : (questions[0].header || 'CC 需要你的决策'))}</span>
  </div>`;

  // Tabs for multiple questions
  if (questions.length > 1) {
    html += `<div class="q-tabs">`;
    for (let i = 0; i < questions.length; i++) {
      const qq = questions[i];
      const isActive = i === activeQuestionTab;
      const qSelected = selectedOptions.get(qq.id);
      const hasCustomAnswer = ((window._customTexts || {})[qq.id] || '').trim().length > 0;
      const hasAnswer = (qSelected && qSelected.size > 0) || hasCustomAnswer;
      html += `<button class="q-tab${isActive ? ' active' : ''}${hasAnswer ? ' answered' : ''}"
        onclick="switchQuestionTab(${i})" type="button">
        <span class="q-tab-label">${escHtml(qq.header || `问题 ${i + 1}`)}</span>
        ${hasAnswer ? '<span class="q-tab-check">✓</span>' : ''}
      </button>`;
    }
    html += `</div>`;
  }

  // Render active question content
  const aq = questions[activeQuestionTab] || questions[0];
  const aqSelected = selectedOptions.get(aq.id) || new Set();

  html += `<div class="q-tab-content" data-question-id="${escAttr(aq.id)}">`;
  html += `<div class="question-text">${escHtml(aq.question)}</div>`;

  // Options
  html += `<div class="q-option-list" role="${aq.multiSelect ? 'group' : 'radiogroup'}" aria-label="选项">`;
  (aq.options || []).forEach(opt => {
    const isSelected = aqSelected.has(opt.value);
    const indicatorClass = aq.multiSelect ? 'q-option-checkbox' : 'q-option-radio';
    html += `<div class="q-option${isSelected ? ' selected' : ''}" data-value="${escAttr(opt.value)}" data-question-id="${escAttr(aq.id)}"
      role="${aq.multiSelect ? 'checkbox' : 'radio'}" aria-checked="${isSelected}" tabindex="0"
      onclick="toggleQuestionOption('${escAttr(aq.id)}', '${escAttr(opt.value)}', ${!!aq.multiSelect})"
      onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleQuestionOption('${escAttr(aq.id)}', '${escAttr(opt.value)}', ${!!aq.multiSelect})}">
      <div class="${indicatorClass}"></div>
      <div class="q-option-content">
        <div class="q-option-label">${escHtml(opt.label)}</div>
        ${opt.description ? `<div class="q-option-desc">${escHtml(opt.description)}</div>` : ''}
      </div>
    </div>`;
  });
  html += '</div>';

  // Custom input
  if (aq.allowCustom !== false) {
    const customVal = (window._customTexts || {})[aq.id] || '';
    html += `<input class="q-other-input" data-question-id="${escAttr(aq.id)}" placeholder="自定义回答..." value="${escAttr(customVal)}" oninput="saveCustomText('${escAttr(aq.id)}', this.value)" />`;
  }

  html += '</div>'; // q-tab-content

  // Actions
  const allAnswered = questions.every(qq => (selectedOptions.get(qq.id) || new Set()).size > 0 || ((window._customTexts || {})[qq.id] || '').trim().length > 0);
  html += `<div class="question-actions">
    <button class="q-submit-btn${allAnswered ? '' : ' q-submit-partial'}" id="questionSubmitBtn" onclick="submitQuestionAnswer('${escAttr(q.id)}')">${questions.length > 1 ? `提交全部回答 (${questions.length}个问题)` : '提交回答'}</button>
    <span class="q-submit-hint">或在 CLI 中回答</span>
    <button class="sound-toggle${soundEnabled ? ' on' : ''}" id="soundToggle" onclick="toggleSound()" title="通知音效">${soundEnabled ? '🔊' : '🔇'}</button>
  </div>`;

  html += '</div>';
  return html;
}

window._customTexts = {};
function saveCustomText(questionId, value) {
  window._customTexts[questionId] = value;
  // Update submit button state and tab indicator without full re-render
  const q = prevState?.pendingQuestion;
  if (!q) return;
  const hasMulti = q.questions && Array.isArray(q.questions) && q.questions.length > 0;
  const questions = hasMulti ? q.questions : [q];
  const btn = document.getElementById('questionSubmitBtn');
  if (btn) {
    const allAnswered = questions.every(qq => (selectedOptions.get(qq.id) || new Set()).size > 0 || ((window._customTexts || {})[qq.id] || '').trim().length > 0);
    btn.classList.toggle('q-submit-partial', !allAnswered);
  }
  // Update tab check mark
  if (hasMulti) {
    const tabs = document.querySelectorAll('.q-tab');
    tabs.forEach((tab, i) => {
      const qq = questions[i];
      if (!qq) return;
      const qSelected = selectedOptions.get(qq.id);
      const hasCustomAnswer = ((window._customTexts || {})[qq.id] || '').trim().length > 0;
      const hasAnswer = (qSelected && qSelected.size > 0) || hasCustomAnswer;
      const existingCheck = tab.querySelector('.q-tab-check');
      if (hasAnswer && !existingCheck) {
        tab.insertAdjacentHTML('beforeend', '<span class="q-tab-check">✓</span>');
        tab.classList.add('answered');
      } else if (!hasAnswer && existingCheck) {
        existingCheck.remove();
        tab.classList.remove('answered');
      }
    });
  }
}

function switchQuestionTab(index) {
  activeQuestionTab = index;
  // Re-render only the question panel
  const panel = document.getElementById('questionPanel');
  const state = prevState;
  if (panel && state && state.pendingQuestion) {
    panel.innerHTML = renderQuestionPanel(state.pendingQuestion);
  }
}

function toggleQuestionOption(questionId, value, multiSelect) {
  if (!selectedOptions.has(questionId)) {
    selectedOptions.set(questionId, new Set());
  }
  const opts = selectedOptions.get(questionId);
  if (multiSelect) {
    if (opts.has(value)) {
      opts.delete(value);
    } else {
      opts.add(value);
    }
  } else {
    opts.clear();
    opts.add(value);
  }
  // Re-render to update tabs and option states
  const panel = document.getElementById('questionPanel');
  const state = prevState;
  if (panel && state && state.pendingQuestion) {
    panel.innerHTML = renderQuestionPanel(state.pendingQuestion);
  }
}

function submitQuestionAnswer(questionId) {
  const btn = document.getElementById('questionSubmitBtn');
  if (!btn) return;

  // Check all questions have answers
  const q = prevState?.pendingQuestion;
  if (!q) return;

  const hasMultiQuestions = q.questions && Array.isArray(q.questions) && q.questions.length > 0;
  const questions = hasMultiQuestions ? q.questions : [{
    id: q.id || 'q-0',
    question: q.question || '',
    header: q.header || 'CC 需要你的决策',
    multiSelect: !!q.multiSelect,
    options: q.options || [],
    allowCustom: q.allowCustom !== false
  }];

  // Build answers array
  const answers = [];
  for (const qq of questions) {
    const opts = selectedOptions.get(qq.id);
    const customText = ((window._customTexts || {})[qq.id] || '').trim();
    const hasOption = opts && opts.size > 0;
    const hasCustom = customText.length > 0;
    if (!hasOption && !hasCustom) {
      btn.textContent = `请先回答: ${qq.header || '问题'}`;
      setTimeout(() => { if (btn) btn.textContent = questions.length > 1 ? `提交全部回答 (${questions.length}个问题)` : '提交回答'; }, 2000);
      return;
    }
    answers.push({
      questionId: qq.id,
      selectedValues: hasOption ? Array.from(opts) : [],
      customText: hasCustom ? customText : ''
    });
  }

  btn.disabled = true;
  btn.textContent = '提交中...';

  fetch('/api/question/answer', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      questionId,
      answers
    })
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      if (btn) { btn.textContent = '已提交 ✓'; }
    } else {
      if (btn) { btn.textContent = data.error || '提交失败'; btn.disabled = false; }
    }
  })
  .catch(err => {
    if (btn) { btn.textContent = '网络错误，请重试'; btn.disabled = false; }
    console.error('[DWS] Submit answer error:', err);
  });
}

// ── Notification handling ───────────────────────────
let prevPendingQuestion = null;
function handleQuestionNotification(state) {
  const q = state.pendingQuestion;
  const indicator = document.getElementById('notifIndicator');

  if (q && q.status === 'pending') {
    // Show notification indicator
    if (indicator) indicator.style.display = 'inline-block';
    // Update tab title
    if (!document.title.startsWith('[?]')) {
      document.title = '[?] ' + document.title.replace(/^\[\?\]\s*/, '');
    }
    // Play sound on NEW question
    if (prevPendingQuestion?.id !== q.id) {
      playQuestionSound();
    }
    // Browser notification if tab not visible and question is new
    if (prevPendingQuestion?.id !== q.id && document.hidden) {
      if (notificationPermissionRequested && Notification.permission === 'granted') {
        try {
          const notifBody = q.questions
            ? q.questions.map(qq => qq.question).join('; ')
            : q.question;
          new Notification('DWS Dashboard — 新问题', {
            body: notifBody,
            tag: 'dws-question-' + q.id
          });
        } catch {}
      }
    }
    // Request notification permission on first question
    if (!notificationPermissionRequested && 'Notification' in window) {
      notificationPermissionRequested = true;
      if (Notification.permission === 'default') {
        Notification.requestPermission().catch(() => {});
      }
    }
  } else {
    // No pending question
    if (indicator) indicator.style.display = 'none';
    document.title = document.title.replace(/^\[\?\]\s*/, '');
  }
  prevPendingQuestion = q;
}
function statusLabel(s) {
  const m = { pending: '待开始', 'in-progress': '进行中', completed: '已完成', blocked: '已阻塞', skipped: '已跳过' };
  return m[s] || s;
}

function fmtTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch { return ''; }
}

function fmtTimeFull(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch { return ''; }
}

function fmtDuration(start, end) {
  if (!start) return '';
  try {
    const s = new Date(start);
    const e = end ? new Date(end) : new Date();
    const sec = Math.round((e - s) / 1000);
    if (sec < 0) return '0s';
    if (sec < 60) return sec + 's';
    const min = Math.floor(sec / 60);
    const remSec = sec % 60;
    if (min < 60) return min + 'm ' + remSec + 's';
    const hr = Math.floor(min / 60);
    return hr + 'h ' + (min % 60) + 'm';
  } catch { return ''; }
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function escAttr(s) {
  return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function getConvergence(rounds) {
  if (rounds.length < 2) return 'stalled';
  const last = rounds[rounds.length - 1];
  const prev = rounds[rounds.length - 2];
  if (last.fatalIssues === 0 && last.highIssues === 0) return 'converging';
  if (last.fatalIssues + last.highIssues < prev.fatalIssues + prev.highIssues) return 'converging';
  if (last.fatalIssues + last.highIssues > prev.fatalIssues + prev.highIssues) return 'diverging';
  return 'stalled';
}

function getBugConvergence(rounds) {
  if (rounds.length < 2) return 'stalled';
  const last = rounds[rounds.length - 1];
  if (last.remainingBugs === 0) return 'converging';
  const prev = rounds[rounds.length - 2];
  if (last.remainingBugs < prev.remainingBugs) return 'converging';
  if (last.remainingBugs > prev.remainingBugs) return 'diverging';
  return 'stalled';
}

function convergenceLabel(c) {
  const m = { converging: '收敛中', stalled: '停滞', diverging: '发散' };
  return m[c] || c;
}

// ── Init ────────────────────────────────────────────
connectSSE();

// Also fetch initial state via API
fetch('/api/state')
  .then(r => r.json())
  .then(state => {
    if (!prevState) {
      renderState(state);
      prevState = state;
      updateLastRefresh();
      console.log('[DWS] Initial state loaded via API');
    }
  })
  .catch((err) => { console.warn('[DWS] API fetch failed:', err) });
</script>
